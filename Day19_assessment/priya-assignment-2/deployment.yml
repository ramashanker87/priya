apiVersion: apps/v1
kind: Deployment
metadata:
  name: priya-eks-app
  namespace: day19-priya
spec:
  replicas: 2
  selector:
    matchLabels:
      app: priya-eks-app
  template:
    metadata:
      labels:
        app: priya-eks-app
    spec:
      containers:
        - name: priya-ecr-container
          image: 386757865964.dkr.ecr.us-east-1.amazonaws.com/priya-eks-app-repository:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
